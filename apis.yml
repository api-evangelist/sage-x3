aid: sage-x3
name: Sage X3
description: 'Sage X3 is an enterprise ERP platform offering REST and GraphQL APIs
  for managing manufacturing, distribution, financials, and supply chain operations
  in mid-market and enterprise organizations. It provides web service interfaces for
  business object integration including sales orders, purchase orders, inventory,
  accounting, and production management across cloud and on-premise deployments.

  '
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/sage-x3/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
- ERP
- Enterprise Resource Planning
- Manufacturing
- Distribution
- Supply Chain
- Financials
- Accounting
- Inventory
- Mid-Market
- Enterprise
apis:
- name: Sage X3 REST Web Services
  description: 'RESTful web service interface for Sage X3 business objects. Supports
    standard HTTP methods (GET, POST, PUT, DELETE) for managing entities such as customers,
    suppliers, sales orders, purchase orders, inventory items, and accounting records.
    Authentication supports Basic Auth (on-premise only), JWT tokens, and OAuth 2.0.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://developer.sage.com/x3
  baseURL: https://{host}/api1/
  tags:
  - REST
  - ERP
  - Business Objects
  - Manufacturing
  - Distribution
  - Financials
  properties:
  - type: Documentation
    url: https://online-help.sagex3.com/erp/12/en-us/Content/V7DEV/api-guide_api-reference-guide.html
  - type: WebServices
    url: https://online-help.sagex3.com/erp/12/en-us/Content/V7DEV/integration-guide_ws-overview.html
- name: Sage X3 GraphQL API
  description: 'GraphQL interface for querying and mutating Sage X3 data. Provides
    a flexible, strongly-typed schema for accessing business objects with support
    for filtering, pagination, and selective field retrieval. Supports OAuth 2.0 and
    Basic Authentication (client ID / client secret for connected apps). Available
    on both cloud and on-premise deployments.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://developer.sage.com/x3/data-integration
  baseURL: https://{host}/graphql
  tags:
  - GraphQL
  - ERP
  - Data Integration
  - Query
  properties:
  - type: Documentation
    url: https://developer.sage.com/x3/data-integration
  - url: graphql/sage-x3-graphql.md
    type: GraphQL
- name: Sage X3 Data Integration API
  description: 'Import/export and data integration API for Sage X3 enabling bulk data
    operations, batch task submissions, and asynchronous processing for high-volume
    data exchange scenarios such as inventory updates, order imports, and financial
    data synchronization.

    '
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://developer.sage.com/x3/data-integration
  baseURL: https://{host}/api1/
  tags:
  - Data Integration
  - Import
  - Export
  - Batch
  - ERP
  properties:
  - type: Documentation
    url: https://developer.sage.com/x3/data-integration
